<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tennis Match Counter</title>
    <style>
        :root {
            --neon-green: #ccff00;
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
        }
        body {
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .container {
            width: 100%;
            max-width: 450px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            box-sizing: border-box;
        }
        h1 {
            color: var(--neon-green);
            font-size: 1.8rem;
            margin-top: 0;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .subtitle {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 25px;
        }
        .set-display {
            font-size: 1.2rem;
            font-weight: bold;
            color: #aaa;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.05);
            padding: 8px 15px;
            border-radius: 10px;
            display: inline-block;
        }
        .score-board {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
        }
        .player-card {
            flex: 1;
            background: rgba(255,255,255,0.02);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .player-name {
            font-size: 1.1rem;
            font-weight: 600;
            margin: 0 0 10px 0;
            color: #ddd;
        }
        .score {
            font-size: 3.5rem;
            font-weight: 800;
            color: #fff;
            margin: 15px 0;
            text-shadow: 0 2px 10px rgba(255,255,255,0.1);
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-point {
            background-color: var(--neon-green);
            color: #000;
            border: none;
            width: 100%;
            padding: 15px 0;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            box-shadow: 0 4px 12px rgba(204, 255, 0, 0.2);
        }
        .btn-point:active {
            transform: scale(0.96);
        }
        .btn-reset {
            background: transparent;
            color: #ff4444;
            border: 1px solid #ff4444;
            padding: 10px 20px;
            font-size: 0.9rem;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.2s;
        }
        .btn-reset:active {
            background: rgba(255, 68, 68, 0.1);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Tennis Counter</h1>
    <div class="subtitle">Live-Test im Smartphone-Browser</div>
    
    <div class="set-display">
        Sätze: <span id="sets1">0</span> &nbsp;:&nbsp; <span id="sets2">0</span>
    </div>

    <div class="score-board">
        <!-- Spieler 1 -->
        <div class="player-card">
            <p class="player-name">Spieler 1</p>
            <div class="score" id="score1">0</div>
            <button class="btn-point" onclick="scorePoint(1)">+ Punkt</button>
        </div>
        
        <!-- Spieler 2 -->
        <div class="player-card">
            <p class="player-name">Spieler 2</p>
            <div class="score" id="score2">0</div>
            <button class="btn-point" onclick="scorePoint(2)">+ Punkt</button>
        </div>
    </div>

    <button class="btn-reset" onclick="resetMatch()">Match zurücksetzen</button>
</div>

<script>
    // Zählweise-Variablen
    let p1Points = 0;
    let p2Points = 0;
    let p1Sets = 0;
    let p2Sets = 0;

    const pointsLookup = ["0", "15", "30", "40"];

    function scorePoint(player) {
        if (player === 1) {
            p1Points++;
        } else {
            p2Points++;
        }
        checkScore();
        updateDisplay();
    }

    function checkScore() {
        // Logik für Spielgewinn (Klassische Tennis-Regeln)
        if (p1Points >= 4 && p1Points - p2Points >= 2) {
            p1Sets++;
            resetPoints();
        } else if (p2Points >= 4 && p2Points - p1Points >= 2) {
            p2Sets++;
            resetPoints();
        }
    }

    function resetPoints() {
        p1Points = 0;
        p2Points = 0;
    }

    function resetMatch() {
        if(confirm("Möchten Sie das gesamte Match zurücksetzen?")) {
            resetPoints();
            p1Sets = 0;
            p2Sets = 0;
            updateDisplay();
        }
    }

    function updateDisplay() {
        let s1 = "";
        let s2 = "";

        // Einstand / Vorteil Logik berechnen
        if (p1Points >= 3 && p2Points >= 3) {
            if (p1Points === p2Points) {
                s1 = "40";
                s2 = "40";
            } else if (p1Points > p2Points) {
                s1 = "Adv";
                s2 = "-";
            } else {
                s1 = "-";
                s2 = "Adv";
            }
        } else {
            s1 = pointsLookup[p1Points] || "0";
            s2 = pointsLookup[p2Points] || "0";
        }

        // DOM Elemente aktualisieren
        document.getElementById('score1').innerText = s1;
        document.getElementById('score2').innerText = s2;
        document.getElementById('sets1').innerText = p1Sets;
        document.getElementById('sets2').innerText = p2Sets;
    }

    // Initialer Aufruf zum Rendern
    updateDisplay();
</script>

</body>
</html>
