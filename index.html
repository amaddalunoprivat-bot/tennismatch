<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TennisMatch</title>
    <style>
        :root {
            --primary: #4CAF50;
            --primary-dark: #388E3C;
            --accent: #FF9800;
            --bg-light: #f5f5f5;
            --text-dark: #333;
            --card-bg: #ffffff;
        }

        body {
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-light);
            color: var(--text-dark);
            overflow-x: hidden;
        }

        .hidden { display: none !important; }

        /* APP-BAR GANZ OBEN */
        .app-bar {
            background: var(--primary);
            color: white;
            padding: 0 16px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            position: relative;
            z-index: 9999 !important; /* Garantiert ganz oben */
        }

        .app-title { 
            font-size: 20px; 
            font-weight: bold; 
        }

        .app-actions { 
            display: flex; 
            gap: 20px; 
            align-items: center; 
        }

        .icon-btn {
            background: transparent;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
            min-width: 44px; /* Apple-Standard für Touch-Ziele */
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        /* Filter-Dropdown */
        .dropdown { 
            position: relative; 
        }
        
        .dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            top: 45px;
            background-color: white;
            min-width: 160px;
            box-shadow: 0px 8px 16px rgba(0,0,0,0.2);
            border-radius: 4px;
            z-index: 10000 !important;
        }
        
        .dropdown-content button {
            color: black;
            padding: 14px 16px;
            background: none;
            border: none;
            width: 100%;
            text-align: left;
            font-size: 16px;
            cursor: pointer;
            box-sizing: border-box;
            display: block;
        }
        
        .dropdown-content button:hover { 
            background-color: #f1f1f1; 
        }
        
        .show { 
            display: block !important; 
        }

        /* Tab-Bar */
        .tab-bar {
            display: flex;
            background: var(--primary);
            border-top: 1px solid rgba(255,255,255,0.1);
            position: relative;
            z-index: 999;
        }
        
        .tab {
            flex: 1;
            text-align: center;
            padding: 16px 0;
            color: rgba(255,255,255,0.7);
            font-weight: bold;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            font-size: 15px;
            -webkit-tap-highlight-color: transparent;
        }
        
        .tab.active-tab {
            color: white;
            border-bottom: 3px solid var(--accent);
        }

        /* Tennisplatz-Hintergrund */
        .tennis-court-bg {
            background-color: #3B7A57;
            background-image: 
                linear-gradient(to right, white 2px, transparent 2px),
                linear-gradient(to bottom, white 2px, transparent 2px);
            background-size: 100% 50%, 50% 100%;
            background-position: center;
            min-height: calc(100vh - 108px);
            padding: 16px;
            box-sizing: border-box;
        }

        .list-container { 
            max-width: 600px; 
            margin: 0 auto; 
        }

        .list-card {
            background: white;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .badge {
            background: #e0e0e0;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }

        .fab {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--accent);
            color: white;
            border: none;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }

        /* Overlays */
        .overlay-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            z-index: 99999 !important;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
        }

        .auth-card {
            background: var(--card-bg);
            padding: 20px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .form-group { margin-bottom: 16px; text-align: left; }
        .form-group label { display: block; font-size: 14px; margin-bottom: 6px; color: #555; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; box-sizing: border-box; }

        .btn-main {
            background: var(--primary); color: white; border: none; width: 100%; padding: 14px;
            font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- HAUPTANSICHT -->
    <div id="dashboardScreen">
        <div class="app-bar">
            <div class="app-title">🎾 TennisMatch</div>
            <div class="app-actions">
                <button class="icon-btn" onclick="openProfileLogic()">👤</button>
                <div class="dropdown">
                    <button class="icon-btn" onclick="toggleFilterMenu(event)">⏳</button>
                    <div id="filterDropdown" class="dropdown-content">
                        <button onclick="applyFilter('Alle')">Alle anzeigen</button>
                        <button onclick="applyFilter('LK 1-5')">🏆 LK 1-5</button>
                        <button onclick="applyFilter('LK 6-10')">🥈 LK 6-10</button>
                        <button onclick="applyFilter('LK 11-15')">🥉 LK 11-15</button>
                    </div>
                </div>
                <button class="icon-btn" onclick="handleLogout()">🚪</button>
            </div>
        </div>

        <div class="tab-bar">
            <div id="tab0" class="tab active-tab" onclick="switchTab(0)">Spieler-Scout</div>
            <div id="tab1" class="tab" onclick="switchTab(1)">Vereine & Gesuche</div>
        </div>

        <div class="tennis-court-bg">
            <!-- SPIELER SCOUT LISTE -->
            <div id="tabContent0" class="list-container">
                <div class="list-card" data-lk="3">
                    <div><strong>Max Mustermann</strong><br><span style="font-size:13px; color:#edf4ed;">TC Blau-Weiß</span></div>
                    <span class="badge" style="background:#ffcc00;">LK 3</span>
                </div>
                <div class="list-card" data-lk="8">
                    <div><strong>Anna Schmidt</strong><br><span style="font-size:13px; color:#edf4ed;">Tennisclub Grün</span></div>
                    <span class="badge" style="background:#cccccc;">LK 8</span>
                </div>
                <div class="list-card" data-lk="14">
                    <div><strong>Kevin Müller</strong><br><span style="font-size:13px; color:#edf4ed;">SV Hamburg</span></div>
                    <span class="badge" style="background:#cd7f32; color:white;">LK 14</span>
                </div>
            </div>

            <!-- VEREINE & GESUCHE LISTE -->
            <div id="tabContent1" class="list-container hidden">
                <div class="list-card">
                    <div><strong>TC Gold-West</strong><br><span style="font-size:13px; color:#edf4ed;">Suchen Herren 30 Spieler</span></div>
                    <span class="badge">Gesuch</span>
                </div>
                <div class="list-card">
                    <div><strong>VfL Tennis</strong><br><span style="font-size:13px; color:#edf4ed;">Trainer für Jugend gesucht</span></div>
                    <span class="badge">Job</span>
                </div>
            </div>
        </div>

        <button class="fab" onclick="handleFabClick()">+</button>
    </div>

    <!-- LOGIN MASK OVERLAY -->
    <div id="authScreen" class="overlay-screen hidden">
        <div style="text-align: right;">
            <button class="btn-main" style="width:auto; padding:8px 16px; background:#666;" onclick="closeAuthScreen()">Abbrechen</button>
        </div>
        <div class="auth-container">
            <div class="auth-card">
                <h2 style="color:var(--primary);">🎾 TennisMatch Login</h2>
                <div class="form-group">
                    <label>E-Mail-Adresse</label>
                    <input type="email" id="emailInput">
                </div>
                <div class="form-group">
